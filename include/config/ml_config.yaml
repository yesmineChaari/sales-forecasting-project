# MLflow Configuration
mlflow:
  tracking_uri: "${MLFLOW_TRACKING_URI:-http://mlflow:5001}"
  experiment_name: "sales_forecasting"
  registry_name: "sales_forecast_models"
  
# Model Configuration
models:
  xgboost:
    params:
      n_estimators: 100
      max_depth: 6
      learning_rate: 0.1
      objective: "reg:squarederror"
      random_state: 42
  
  lightgbm:
    params:
      num_leaves: 31
      learning_rate: 0.05
      n_estimators: 100
      objective: "regression"
      random_state: 42
  
  prophet:
    enabled: true
    params:
      seasonality_mode: "multiplicative"
      changepoint_prior_scale: 0.05
      seasonality_prior_scale: 10
      yearly_seasonality: true
      weekly_seasonality: true
      daily_seasonality: false

# Feature Engineering
features:
  date_features:
    - "year"
    - "month"
    - "day"
    - "dayofweek"
    - "quarter"
    - "weekofyear"
    - "is_weekend"
  
  lag_features:
    - 1
    - 2
    - 3
    - 7
    - 14
    - 21
    - 30
  
  rolling_features:
    windows: [3, 7, 14, 21, 30]
    functions: ["mean", "std", "min", "max", "median"]

# Data Validation
validation:
  required_columns:
    - "date"
    - "store_id"
    - "sales"
    - "customer_traffic"
    - "has_promotion"
    - "is_open"
    - "is_holiday"

  data_types:
    date: "datetime64[ns]"
    store_id: "object"
    sales: "float64"
    customer_traffic: "float64"
    has_promotion: "int64"
    is_open: "int64"
    is_holiday: "int64"
    school_holiday: "int64"
    state_holiday: "object"
    store_type: "object"
    assortment: "object"
    competition_distance: "float64"
    promo2: "int64"
    promo_interval: "object"

  value_ranges:
    sales:
      min: 0
      max: 10000000
    customer_traffic:
      min: 0
    competition_distance:
      min: 0
    has_promotion:
      min: 0
      max: 1
    is_open:
      min: 0
      max: 1
    is_holiday:
      min: 0
      max: 1
    school_holiday:
      min: 0
      max: 1
    promo2:
      min: 0
      max: 1

  non_null_columns:
    - "date"
    - "store_id"
    - "sales"
    - "customer_traffic"
    - "has_promotion"
    - "is_open"
    - "is_holiday"

  unique_key:
    - "date"
    - "store_id"

  binary_columns:
    - "has_promotion"
    - "is_open"
    - "is_holiday"
    - "school_holiday"
    - "promo2"

  file_date_column: "date"
  expected_frequency: "D"
  max_issue_examples: 25
  max_outlier_percentage: 10.0
  warn_on_future_dates: true
  fail_on_future_dates: false

# Training Configuration
training:
  test_size: 0.2
  validation_size: 0.1
  cv_folds: 5
  metrics:
    - "rmse"
    - "mae"
    - "mape"
    - "r2"

# Inference Configuration
inference:
  batch_size: 1000
  prediction_horizon: 30  # days
  confidence_intervals: [0.8, 0.95]

# Monitoring Configuration
monitoring:
  drift_detection:
    enabled: true
    method: "kolmogorov_smirnov"
    threshold: 0.1
  
  performance_monitoring:
    enabled: true
    alert_threshold:
      rmse: 1000
      mape: 0.2
